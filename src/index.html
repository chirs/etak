<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Etak — reference-island puzzles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0d1420; --night-2:#101b2b;
    --starlight:#f3ead2; --amber:#f0a848; --teal:#5aa8aa;
    --sand:#c9b089; --faint:#8fa0b5;
    --panel:#131e2ecc; --line:#26344a;
    --good:#7fc99b; --bad:#d98a6a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--night);color:var(--starlight);
    font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
  canvas{display:block;position:fixed;inset:0;width:100vw;height:100vh}

  header{position:fixed;top:0;left:0;right:0;padding:18px 24px 0;pointer-events:none;z-index:3}
  h1{font-family:'Marcellus',serif;font-weight:400;font-size:clamp(20px,3.2vw,32px);letter-spacing:.06em}
  .sub{color:var(--faint);font-size:12.5px;max-width:50ch;margin-top:4px;line-height:1.45}

  /* mode toggle top-left under title handled inline; frame toggle top-right */
  .frames{position:fixed;top:18px;right:24px;z-index:4;display:flex;flex-direction:column;
    border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(6px);
    border-radius:10px;overflow:hidden}
  .frames button{appearance:none;border:0;background:transparent;color:var(--faint);
    font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:left;padding:10px 15px;
    cursor:pointer;border-left:3px solid transparent;transition:color .25s,border-color .25s,background .25s}
  .frames button+button{border-top:1px solid var(--line)}
  .frames button.active{color:var(--starlight);background:#1a273a;border-left-color:var(--amber)}
  .frames button:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
  .frames .hint{font-size:10px;color:#5d6d84;padding:6px 15px 8px;border-top:1px solid var(--line);
    font-family:'IBM Plex Mono',monospace}

  /* score panel — puzzle mode signature */
  .score{position:fixed;right:24px;top:132px;z-index:4;width:212px;
    border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(6px);
    border-radius:10px;padding:14px 16px;font-family:'IBM Plex Mono',monospace;
    transition:opacity .3s;}
  .score.hidden{opacity:0;pointer-events:none}
  .score .big{font-size:38px;line-height:1;color:var(--starlight);font-weight:500}
  .score .big span{font-size:15px;color:var(--faint)}
  .score .label{font-size:10px;color:#5d6d84;letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px}
  .meter{margin-top:11px}
  .meter .row{display:flex;justify-content:space-between;font-size:10.5px;color:var(--faint);margin-bottom:3px}
  .meter .track{height:4px;background:#1c2839;border-radius:2px;overflow:hidden}
  .meter .fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s,background .3s}
  .score .verdict{margin-top:12px;font-size:11px;line-height:1.5;color:var(--faint);min-height:2.4em}

  /* candidate chooser */
  .chooser{position:fixed;left:24px;top:132px;z-index:4;
    display:flex;flex-direction:column;gap:6px;font-family:'IBM Plex Mono',monospace;
    transition:opacity .3s}
  .chooser.hidden{opacity:0;pointer-events:none}
  .chooser .ttl{font-size:10px;color:#5d6d84;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px}
  .chooser button{appearance:none;text-align:left;border:1px solid var(--line);
    background:var(--panel);color:var(--faint);border-radius:8px;padding:8px 12px;
    font-family:inherit;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;
    gap:14px;min-width:186px;transition:border-color .2s,color .2s,background .2s}
  .chooser button:hover{border-color:var(--teal);color:var(--starlight)}
  .chooser button.chosen{border-color:var(--amber);color:var(--starlight);background:#1a273a}
  .chooser button .sc{color:#5d6d84}
  .chooser button.chosen .sc{color:var(--amber)}
  .chooser button:focus-visible{outline:2px solid var(--amber)}

  .readout{position:fixed;left:24px;bottom:84px;z-index:3;font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;line-height:1.85;color:var(--faint);pointer-events:none}
  .readout b{color:var(--starlight);font-weight:500}
  .readout .etakN{color:var(--amber)}

  .bar{position:fixed;left:0;right:0;bottom:0;z-index:4;display:flex;align-items:center;gap:16px;
    padding:14px 24px;background:linear-gradient(to top,#0d1420f2,#0d142000)}
  .bar button.icon{appearance:none;border:1px solid var(--line);background:var(--panel);
    color:var(--starlight);width:44px;height:44px;border-radius:50%;font-size:15px;cursor:pointer;flex:none;
    transition:border-color .2s}
  .bar button.icon:hover{border-color:var(--amber)}
  .bar button.icon:focus-visible{outline:2px solid var(--amber)}
  #scrub{flex:1}
  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:2px;background:var(--line);border-radius:1px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;
    border-radius:50%;background:var(--starlight);margin-top:-6px}
  input[type=range]::-moz-range-track{height:2px;background:var(--line)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;border:0;background:var(--starlight)}
  .speedwrap{display:flex;align-items:center;gap:8px;flex:none;font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:var(--faint)}
  #speed{width:100px}

  .modeswitch{position:fixed;left:24px;top:96px;z-index:4;display:flex;gap:0;
    border:1px solid var(--line);border-radius:8px;overflow:hidden;font-family:'IBM Plex Mono',monospace}
  .modeswitch button{appearance:none;border:0;background:var(--panel);color:var(--faint);
    font-family:inherit;font-size:11.5px;padding:7px 14px;cursor:pointer;transition:color .2s,background .2s}
  .modeswitch button+button{border-left:1px solid var(--line)}
  .modeswitch button.active{background:#1a273a;color:var(--starlight)}
  .modeswitch button:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}

  .newbtn{position:fixed;right:24px;bottom:84px;z-index:4;appearance:none;
    border:1px solid var(--line);background:var(--panel);color:var(--starlight);
    font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px 16px;border-radius:8px;cursor:pointer;
    transition:border-color .2s,opacity .3s}
  .newbtn:hover{border-color:var(--amber)}
  .newbtn.hidden{opacity:0;pointer-events:none}
  .newbtn:focus-visible{outline:2px solid var(--amber)}

  @media (max-width:900px){
    .sub{max-width:38ch}
    .score{top:auto;bottom:130px;width:160px}
    .chooser{top:auto;bottom:220px}
    .readout{bottom:78px;font-size:11px}
  }
</style>
</head>
<body>
<canvas id="sea"></canvas>

<header>
  <h1>ETAK</h1>
  <div class="sub" id="sub">Choose the reference island whose bearing best divides the voyage into etaks.</div>
</header>

<div class="modeswitch" role="group" aria-label="Mode">
  <button id="mPuzzle" class="active">PUZZLE</button>
  <button id="mSandbox">SANDBOX</button>
</div>

<div class="frames" role="group" aria-label="Reference frame">
  <button id="fChart" class="active">CHART · the canoe moves</button>
  <button id="fEtak">NAVIGATOR · the islands move</button>
  <div class="hint">same voyage, two frames</div>
</div>

<div class="chooser" id="chooser">
  <div class="ttl">candidate references</div>
</div>

<div class="score hidden" id="scorePanel">
  <div class="label">segmentation quality</div>
  <div class="big" id="scoreBig">—<span>/100</span></div>
  <div class="meter">
    <div class="row"><span>count</span><span id="cntVal"></span></div>
    <div class="track"><div class="fill" id="cntFill" style="width:0"></div></div>
  </div>
  <div class="meter">
    <div class="row"><span>evenness</span><span id="evnVal"></span></div>
    <div class="track"><div class="fill" id="evnFill" style="width:0"></div></div>
  </div>
  <div class="verdict" id="verdict"></div>
</div>

<div class="readout" id="readout"></div>
<button class="newbtn" id="newBtn">NEW VOYAGE ⟳</button>

<div class="bar">
  <button id="play" class="icon" aria-label="Play or pause">▶</button>
  <input id="scrub" type="range" min="0" max="1" step="0.0005" value="0" aria-label="Voyage progress">
  <div class="speedwrap"><span>speed</span>
    <input id="speed" type="range" min="0.2" max="3" step="0.1" value="1" aria-label="Speed"></div>
</div>

<script>
(() => {
'use strict';

const canvas = document.getElementById('sea');
const ctx = canvas.getContext('2d');
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const HOUSE = 11.25;

// ---------- viewport ----------
let W=0,H=0,DPR=1,scale=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  canvas.width=W*DPR;canvas.height=H*DPR;
  scale=Math.min(W/1150,H/1900);
}
addEventListener('resize',resize);resize();

// ---------- geometry ----------
const lerp=(a,b,k)=>a+(b-a)*k;
function bearing(p,q){const d=Math.atan2(q.x-p.x,-(q.y-p.y))*180/Math.PI;return (d+360)%360;}
const houseOf=deg=>Math.floor(((deg+HOUSE/2)%360)/HOUSE);

// count the star-house crossings of bearing(canoe->ref) along the leg, return boundary t's
function boundariesFor(A,B,ref){
  const at=tt=>({x:lerp(A.x,B.x,tt),y:lerp(A.y,B.y,tt)});
  const out=[];let prev=houseOf(bearing(at(0),ref));
  const N=2000;
  for(let i=1;i<=N;i++){const tt=i/N;const h=houseOf(bearing(at(tt),ref));
    if(h!==prev){out.push(tt);prev=h;}}
  return out;
}

// ---------- scoring ----------
// score = count-fitness x evenness. Both 0..1, combined and scaled to 100.
const SWEET=6;              // ideal etak count for a leg of this length
function scoreFor(A,B,ref){
  const b=boundariesFor(A,B,ref);
  const segs=b.length+1;
  // count fitness: gaussian around SWEET, tolerant of +-3
  const cf=Math.exp(-Math.pow(segs-SWEET,2)/(2*3*3));
  // evenness: 1 - normalized stddev of segment lengths
  const edges=[0,...b,1];
  const lens=[];for(let i=1;i<edges.length;i++)lens.push(edges[i]-edges[i-1]);
  const mean=1/lens.length;
  const varr=lens.reduce((s,l)=>s+(l-mean)*(l-mean),0)/lens.length;
  const sd=Math.sqrt(varr);
  const ev=segs<2?0:Math.max(0,1-sd/mean); // cv-based; single segment scores 0
  const total=Math.round(100*(0.5*cf+0.5*ev));
  return {segs,count:cf,even:ev,total,boundaries:b};
}
function verdictText(s){
  if(s.segs<2) return 'Nearly in line with your course — its bearing barely moves. No usable etaks.';
  if(s.count<0.4 && s.segs>SWEET) return 'Close and abeam — the bearing races. Many tiny etaks, hard to feel.';
  if(s.count<0.4) return 'Distant and shallow — too few divisions to track progress.';
  if(s.even<0.5) return 'Segments run uneven — bunched at one end of the passage.';
  if(s.total>=80) return 'Sits well abeam. Its bearing sweeps steadily — clean, even etaks.';
  return 'Workable. The bearing opens at a usable rate across the leg.';
}

// ---------- puzzle generation ----------
let seed=Date.now()%2147483647;
const rnd=()=>(seed=(seed*16807)%2147483647)/2147483647;
const rng=(a,b)=>a+(b-a)*rnd();

function blob(rBase,n,jitter,s0){
  const save=seed;seed=s0;const pts=[];
  for(let i=0;i<n;i++){const a=i/n*2*Math.PI;const r=rBase*(1+(rnd()-0.5)*jitter);
    pts.push([Math.cos(a)*r,Math.sin(a)*r*0.72]);}
  seed=save;return pts;
}

let puzzle=null;   // {A,B,candidates:[{x,y,name,shape,score}], chosenIndex}
const NAMES=[' ELATO',' LAMOTREK',' SATAWAL',' PULUWAT',' PULAP',' FARAULEP',' WOLEAI',' IFALUK',' EAURIPIK',' PIKELOT'];

function makePuzzle(){
  // course roughly horizontal, jittered
  const A={x:-430,y:rng(-60,60),name:'HOME'};
  const B={x: 430,y:rng(-60,60),name:'DESTINATION'};
  const mid={x:(A.x+B.x)/2,y:(A.y+B.y)/2};

  const cands=[];
  // 1) one deliberately strong candidate: well abeam, far enough for ~6 etaks
  {
    const side=rnd()<0.5?-1:1;
    let best=null;
    for(let tries=0;tries<50;tries++){
      const off=rng(-120,120);
      const dist=rng(580,860);
      const c={x:mid.x+off,y:mid.y+side*dist};
      const s=scoreFor(A,B,c);
      if(!best||s.total>best.s.total)best={c,s};
    }
    cands.push(best.c);
  }
  // 2) a trap: nearly in line with the course (beyond an endpoint)
  {
    const beyond=rnd()<0.5?-1:1;
    const c={x:(beyond<0?A.x:B.x)+beyond*rng(150,320),y:mid.y+rng(-40,40)};
    cands.push(c);
  }
  // 3) a trap: too close and abeam -> confetti
  {
    const side=rnd()<0.5?-1:1;
    const c={x:mid.x+rng(-140,140),y:mid.y+side*rng(120,240)};
    cands.push(c);
  }
  // 4) a middling one: right region, off-center so evenness suffers
  {
    const side=rnd()<0.5?-1:1;
    const c={x:mid.x+rng(-360,360),y:mid.y+side*rng(420,760)};
    cands.push(c);
  }

  // shuffle so the strong one isn't always first
  for(let i=cands.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}

  const candidates=cands.map((c,i)=>({
    x:c.x,y:c.y,name:NAMES[Math.floor(rnd()*NAMES.length)],
    shape:blob(rng(18,26),12,0.6,(i+2)*997+Math.floor(rnd()*500)),
    score:scoreFor(A,B,c)
  }));

  puzzle={A,B,candidates,chosenIndex:0};
  buildChooserUI();
  applyChoice(0,false);
}

// ---------- active leg + reference (drives sim + drawing) ----------
let A,B,C;                 // active home/dest/reference (C is a live {x,y,name})
let boundaries=[];
let live=null;             // current score object

function applyChoice(i,animate){
  puzzle.chosenIndex=i;
  const cand=puzzle.candidates[i];
  A=puzzle.A;B=puzzle.B;
  C={x:cand.x,y:cand.y,name:cand.name};
  recompute();
  [...chooserEl.querySelectorAll('button')].forEach((b,k)=>b.classList.toggle('chosen',k===i));
  t=0;scrub.value=0;setPlaying(false);
}

function recompute(){
  live=scoreFor(A,B,C);
  boundaries=live.boundaries;
  updateScorePanel();
}

// ---------- sandbox leg ----------
function makeSandbox(){
  A={x:-420,y:0,name:'HOME'};
  B={x:420,y:0,name:'DESTINATION'};
  C={x:40,y:-270,name:'REFERENCE'};
  C.shape=blob(22,12,0.65,37);
  recompute();
  t=0;scrub.value=0;setPlaying(false);
}

// ---------- sim state ----------
let t=0,playing=false,speedMul=1,f=0,fTarget=0;
let mode='puzzle';
const canoeAt=tt=>({x:lerp(A.x,B.x,tt),y:lerp(A.y,B.y,tt)});

// ---------- decorative stars ----------
let sSeed=7;const srnd=()=>(sSeed=(sSeed*16807)%2147483647)/2147483647;
const stars=Array.from({length:130},()=>({x:srnd(),y:srnd(),r:srnd()*1.1+0.3,p:srnd()*6.28,s:srnd()*0.7+0.3}));
const shapeA=blob(30,14,0.55,11), shapeB=blob(26,12,0.6,23);

// ---------- transform ----------
const ease=k=>k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
function worldTransform(){
  const fe=ease(f);const rot=fe*(-Math.PI/2);const P=canoeAt(t);
  const O={x:P.x*fe,y:P.y*fe};
  ctx.translate(W/2,H/2+(1-fe)*20);ctx.rotate(rot);ctx.scale(scale,scale);ctx.translate(-O.x,-O.y);
  return fe;
}

function drawIslandShape(x,y,shape,color,glow,fe,name,labelBelow,dim){
  ctx.save();ctx.translate(x,y);
  if(glow){const g=ctx.createRadialGradient(0,0,4,0,0,70);
    g.addColorStop(0,glow);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,70,0,7);ctx.fill();}
  ctx.globalAlpha=dim?0.4:1;
  ctx.beginPath();shape.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.closePath();
  ctx.fillStyle=color;ctx.fill();ctx.globalAlpha=1;
  ctx.rotate(fe*Math.PI/2);
  ctx.fillStyle=dim?'#5d6d84':'#8fa0b5';ctx.font='10px "IBM Plex Mono",monospace';ctx.textAlign='center';
  ctx.fillText(name,0,labelBelow?46:-38);
  ctx.restore();
}

function drawRose(P,fe,refDeg){
  const R=250;ctx.save();ctx.translate(P.x,P.y);ctx.globalAlpha=0.12+0.88*fe;
  ctx.strokeStyle='#33445e';ctx.lineWidth=1/scale*0.8+0.4;
  ctx.beginPath();ctx.arc(0,0,R,0,7);ctx.stroke();
  const cur=houseOf(refDeg);
  for(let i=0;i<32;i++){const deg=i*HOUSE;const a=(deg-90)*Math.PI/180;
    const major=i%8===0;const len=major?16:(i%4===0?10:6);
    ctx.strokeStyle=i===cur?'#f0a848':'#4a5b76';ctx.lineWidth=i===cur?2.2:1;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*(R-len),Math.sin(a)*(R-len));
    ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R);ctx.stroke();}
  const names=[[0,'POLARIS · N'],[90,'ALTAIR RISING · E'],[180,'CRUX · S'],[270,'ALTAIR SETTING · W']];
  ctx.fillStyle='#8fa0b5';ctx.font='9.5px "IBM Plex Mono",monospace';ctx.textAlign='center';
  for(const [deg,nm] of names){const a=(deg-90)*Math.PI/180;
    ctx.save();ctx.translate(Math.cos(a)*(R+20),Math.sin(a)*(R+20));ctx.rotate(fe*Math.PI/2);
    ctx.fillText(nm,0,3);ctx.restore();}
  ctx.restore();
}

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0d1420');g.addColorStop(1,'#101b2b');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  const now=performance.now()/1000;
  for(const s of stars){const tw=reduceMotion?0.75:0.55+0.45*Math.sin(now*s.s+s.p);
    ctx.globalAlpha=0.35*tw;ctx.fillStyle='#f3ead2';
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;

  ctx.save();
  const fe=worldTransform();
  const P=canoeAt(t);
  const refDeg=bearing(P,C);

  // course + etak ticks
  ctx.strokeStyle='#28506088';ctx.lineWidth=1.5;ctx.setLineDash([6,7]);
  ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke();ctx.setLineDash([]);
  for(const bt of boundaries){const q=canoeAt(bt);
    ctx.strokeStyle=bt<t?'#f0a84899':'#3a4c66';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(q.x,q.y-9);ctx.lineTo(q.x,q.y+9);ctx.stroke();}

  // drift trails in navigator frame
  if(fe>0.03){
    for(const I of [A,B,C]){const col=I===C?'#f0a848':'#5aa8aa';
      for(let k=1;k<=14;k++){const tp=t-k*0.02;if(tp<0)break;const Pp=canoeAt(tp);
        ctx.globalAlpha=fe*(1-k/15)*0.5;ctx.fillStyle=col;
        ctx.beginPath();ctx.arc(I.x+(P.x-Pp.x),I.y+(P.y-Pp.y),2,0,7);ctx.fill();}}
    ctx.globalAlpha=1;
  }
  // wake in chart frame
  if(fe<0.97&&t>0.005){ctx.strokeStyle=`rgba(90,168,170,${0.6*(1-fe)})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(P.x,P.y);ctx.stroke();}

  drawRose(P,fe,refDeg);

  // ghost candidates (puzzle mode, non-chosen) — dimmed, with faint bearing lines
  if(mode==='puzzle'&&puzzle){
    puzzle.candidates.forEach((cd,i)=>{
      if(i===puzzle.chosenIndex)return;
      ctx.strokeStyle='#3a4c6655';ctx.lineWidth=1;ctx.setLineDash([2,6]);
      ctx.beginPath();ctx.moveTo(P.x,P.y);ctx.lineTo(cd.x,cd.y);ctx.stroke();ctx.setLineDash([]);
      drawIslandShape(cd.x,cd.y,cd.shape,'#243247',null,fe,cd.name,false,true);
    });
  }

  // chosen reference bearing
  ctx.strokeStyle='#f0a848';ctx.lineWidth=1.6;ctx.setLineDash([2,5]);
  ctx.beginPath();ctx.moveTo(P.x,P.y);ctx.lineTo(C.x,C.y);ctx.stroke();ctx.setLineDash([]);

  drawIslandShape(A.x,A.y,shapeA,'#2a3a4f',null,fe,A.name,true,false);
  drawIslandShape(B.x,B.y,shapeB,'#2a3a4f',null,fe,B.name,true,false);
  const cShape=(mode==='sandbox')?C.shape:puzzle.candidates[puzzle.chosenIndex].shape;
  drawIslandShape(C.x,C.y,cShape,'#4a3a22','rgba(240,168,72,0.18)',fe,C.name,false,false);

  // canoe
  ctx.save();ctx.translate(P.x,P.y);ctx.fillStyle='#f3ead2';
  ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-10,-7);ctx.lineTo(-6,0);ctx.lineTo(-10,7);ctx.closePath();ctx.fill();
  ctx.restore();

  ctx.restore();
  updateReadout(refDeg);
}

// ---------- UI ----------
const readoutEl=document.getElementById('readout');
function updateReadout(refDeg){
  const seg=boundaries.filter(b=>b<t).length+1;
  const total=boundaries.length+1;
  const segName=total>1&&seg===total?' — etak of sighting':
                total>2&&seg===total-1?' — etak of birds':'';
  readoutEl.innerHTML=
    `etak <b class="etakN">${seg}</b> of <b>${total}</b>${segName}<br>`+
    `bearing to reference <b>${refDeg.toFixed(1).padStart(5,'0')}°</b> · house <b>${houseOf(refDeg)+1}</b>/32<br>`+
    `voyage <b>${Math.round(t*100)}%</b>`;
}

const scorePanel=document.getElementById('scorePanel');
const scoreBig=document.getElementById('scoreBig');
const cntFill=document.getElementById('cntFill'),evnFill=document.getElementById('evnFill');
const cntVal=document.getElementById('cntVal'),evnVal=document.getElementById('evnVal');
const verdictEl=document.getElementById('verdict');
function gradeColor(v){return v>=0.75?'var(--good)':v>=0.45?'var(--teal)':'var(--bad)';}
function updateScorePanel(){
  if(!live)return;
  scoreBig.innerHTML=`${live.total}<span>/100</span>`;
  cntFill.style.width=(live.count*100)+'%';cntFill.style.background=gradeColor(live.count);
  evnFill.style.width=(live.even*100)+'%';evnFill.style.background=gradeColor(live.even);
  cntVal.textContent=live.segs+' etaks';
  evnVal.textContent=Math.round(live.even*100)+'%';
  verdictEl.textContent=verdictText(live);
}

const chooserEl=document.getElementById('chooser');
function buildChooserUI(){
  chooserEl.querySelectorAll('button').forEach(b=>b.remove());
  puzzle.candidates.forEach((cd,i)=>{
    const btn=document.createElement('button');
    btn.innerHTML=`<span>${cd.name.trim()}</span><span class="sc">${cd.score.total}</span>`;
    btn.addEventListener('click',()=>applyChoice(i,true));
    chooserEl.appendChild(btn);
  });
}

// ---------- controls ----------
const playBtn=document.getElementById('play'),scrub=document.getElementById('scrub'),speedEl=document.getElementById('speed');
function setPlaying(p){playing=p;playBtn.textContent=p?'❚❚':'▶';}
playBtn.addEventListener('click',()=>{if(!playing&&t>=1)t=0;setPlaying(!playing);});
scrub.addEventListener('input',()=>{t=+scrub.value;setPlaying(false);});
speedEl.addEventListener('input',()=>{speedMul=+speedEl.value;});

document.getElementById('fChart').addEventListener('click',e=>{fTarget=0;frameActive(e.target);});
document.getElementById('fEtak').addEventListener('click',e=>{fTarget=1;frameActive(e.target);});
function frameActive(btn){document.querySelectorAll('.frames button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

const mPuzzle=document.getElementById('mPuzzle'),mSandbox=document.getElementById('mSandbox');
const newBtn=document.getElementById('newBtn'),subEl=document.getElementById('sub');
function setMode(m){
  mode=m;
  mPuzzle.classList.toggle('active',m==='puzzle');
  mSandbox.classList.toggle('active',m==='sandbox');
  scorePanel.classList.toggle('hidden',m!=='puzzle');
  chooserEl.classList.toggle('hidden',m!=='puzzle');
  newBtn.classList.toggle('hidden',m!=='puzzle');
  if(m==='puzzle'){subEl.textContent='Choose the reference island whose bearing best divides the voyage into etaks. Score updates live.';makePuzzle();}
  else{subEl.textContent='Free exploration. Drag the reference island; watch how its position reshapes the etaks.';makeSandbox();}
}
mPuzzle.addEventListener('click',()=>setMode('puzzle'));
mSandbox.addEventListener('click',()=>setMode('sandbox'));
newBtn.addEventListener('click',()=>makePuzzle());

// ---------- sandbox drag ----------
function screenToWorld(sx,sy){
  const fe=ease(f);const rot=fe*(-Math.PI/2);const P=canoeAt(t);
  let x=sx-W/2,y=sy-(H/2+(1-fe)*20);
  const c=Math.cos(-rot),s=Math.sin(-rot);[x,y]=[x*c-y*s,x*s+y*c];x/=scale;y/=scale;
  return {x:x+P.x*fe,y:y+P.y*fe};
}
let dragging=false;
canvas.addEventListener('pointerdown',e=>{
  if(mode!=='sandbox')return;
  const w=screenToWorld(e.clientX,e.clientY);
  if(Math.hypot(w.x-C.x,w.y-C.y)<60){dragging=true;canvas.setPointerCapture(e.pointerId);}
});
canvas.addEventListener('pointermove',e=>{
  if(!dragging)return;const w=screenToWorld(e.clientX,e.clientY);
  C.x=w.x;C.y=w.y;recompute();
});
canvas.addEventListener('pointerup',()=>{dragging=false;});

// ---------- loop ----------
let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,0.05);last=now;
  if(playing){t+=dt*0.03*speedMul;if(t>=1){t=1;setPlaying(false);}scrub.value=t;}
  const fSpeed=reduceMotion?8:2.6;
  f+=(fTarget-f)*Math.min(1,dt*fSpeed);if(Math.abs(fTarget-f)<0.001)f=fTarget;
  draw();
  requestAnimationFrame(loop);
}
setMode('puzzle');
requestAnimationFrame(loop);
})();
</script>
