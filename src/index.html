<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Etak — reference-island puzzles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="sea"></canvas>

<header>
  <h1>ETAK</h1>
  <div class="sub" id="sub">Choose the reference island whose bearing best divides the voyage into etaks.</div>
</header>

<div class="modeswitch" role="group" aria-label="Mode">
  <button id="mPuzzle" class="active">PUZZLE</button>
  <button id="mSandbox">SANDBOX</button>
</div>

<div class="frames" role="group" aria-label="Reference frame">
  <button id="fChart" class="active">CHART · the canoe moves</button>
  <button id="fEtak">NAVIGATOR · the islands move</button>
  <button id="fBoat">BOAT · the horizon</button>
  <div class="hint">same voyage, three frames</div>
</div>

<div class="chooser" id="chooser">
  <div class="ttl">candidate references</div>
</div>

<div class="readout" id="readout"></div>
<button class="newbtn" id="newBtn">NEW VOYAGE ⟳</button>

<div class="bar">
  <button id="play" class="icon" aria-label="Play or pause">▶</button>
  <div class="scrubwrap">
    <div class="etakstrip" id="etakStrip"></div>
    <input id="scrub" type="range" min="0" max="1" step="0.0005" value="0" aria-label="Voyage progress">
  </div>
  <div class="speedwrap"><span>speed</span>
    <input id="speed" type="range" min="0.2" max="3" step="0.1" value="1" aria-label="Speed"></div>
</div>

<script src="core.js"></script>
<script src="map-data.js"></script>
<script src="stars.js"></script>
<script src="passages.js"></script>
<script src="app.js"></script>
</body>
</html>
